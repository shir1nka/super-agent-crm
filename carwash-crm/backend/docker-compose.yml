services:
  # ============================================
  # PostgreSQL - основная БД
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: carwash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carwash_crm
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carwash-network

  # ============================================
  # Redis - для сессий, Bull очередей, кэша
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: carwash-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carwash-network

  # ============================================
  # Adminer - для управления PostgreSQL (опционально)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: carwash-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - carwash-network

  # ============================================
  # API - NestJS приложение
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carwash-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/carwash_crm?schema=public
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # JWT
      JWT_SECRET: production-super-secret-jwt-key-change-me-please-12345
      JWT_REFRESH_SECRET: production-super-secret-refresh-key-change-me-please-54321
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      
      # Server
      PORT: 3000
      NODE_ENV: production
      
      # CORS
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173,https://your-domain.com
      
      # Telegram (опционально)
      # TELEGRAM_BOT_TOKEN: your-telegram-bot-token
      
      # Sentry (опционально)
      # SENTRY_DSN: https://your-sentry-dsn@sentry.io/project-id
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - carwash-network

# ============================================
# Volumes для постоянного хранения данных
# ============================================
volumes:
  postgres_data:
  redis_data:

# ============================================
# Networks
# ============================================
networks:
  carwash-network:
    driver: bridge
